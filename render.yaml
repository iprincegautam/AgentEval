services:
  - type: web
    name: agenteval-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: https://agenteval.vercel.app,https://agenteval-iprincegautam.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: "3.12.0"
