name: Deploy Backend (Render)

# Trigger Render deploy hook after push (set RENDER_DEPLOY_HOOK in repo secrets)
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "render.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
